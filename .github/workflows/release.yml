name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.13"

      - name: Upgrade pip
        run: |
          pip install -c ${{ github.workspace }}/.github/workflows/constraints.txt pip
          pip --version

      - name: Install Poetry
        run: |
          pipx install --pip-args "-c ${{ github.workspace }}/.github/workflows/constraints.txt" poetry
          pipx inject poetry poetry-plugin-export
          poetry --version

      - name: Check if there is a parent commit
        id: check-parent-commit
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse --verify --quiet HEAD^ >/dev/null; then
            echo "has-parent=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse --verify HEAD^)" >> "$GITHUB_OUTPUT"
            echo "Parent commit detected: true"
          else
            echo "has-parent=false" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "Parent commit detected: false"
          fi

      - name: Detect and tag new version
        id: check-version
        if: steps.check-parent-commit.outputs.has-parent == 'true'
        shell: bash
        run: |
          set -euo pipefail

          read_version_from_file() {
            python - "$1" <<'PY'
          import sys
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path(sys.argv[1]).read_text())
          version = (
              data.get("project", {}).get("version")
              or data.get("tool", {}).get("poetry", {}).get("version")
          )

          if not version:
              raise SystemExit("Could not find version in [project] or [tool.poetry]")

          print(version)
          PY
          }

          PREVIOUS_VERSION="$(read_version_from_file <(git show HEAD~1:pyproject.toml))"
          CURRENT_VERSION="$(read_version_from_file pyproject.toml)"

          echo "Previous version: $PREVIOUS_VERSION"
          echo "Current version: $CURRENT_VERSION"

          echo "previous-version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"
          echo "current-version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Version has not changed; nothing to tag."
            exit 0
          fi

          TAG="v$CURRENT_VERSION"

          git fetch --tags

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Creating tag $TAG"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Released version $CURRENT_VERSION"
          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Bump version for developmental release
        if: (!steps.check-version.outputs.tag)
        run: |
          poetry version patch &&
          version=$(poetry version | awk '{ print $2 }') &&
          poetry version $version.dev.$(date +%s)

      - name: Build package
        run: |
          poetry build --ansi

      - name: Publish package on PyPI
        if: steps.check-version.outputs.tag
        uses: pypa/gh-action-pypi-publish@v1.13.0

      - name: Publish package on TestPyPI
        if: "! steps.check-version.outputs.tag"
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish the release notes
        uses: release-drafter/release-drafter@v6.1.0
        with:
          publish: ${{ steps.check-version.outputs.tag != '' }}
          tag: ${{ steps.check-version.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
